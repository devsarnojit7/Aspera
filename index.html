<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspera</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #050810;
    --panel: #0a0f1e;
    --border: #1a2540;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --warn: #ffd166;
    --text: #c8d8f0;
    --dim: #4a6080;
    --solid: #00d4ff;
    --liquid: #ff6b35;
    --hybrid: #7fff6b;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';

    position: fixed;

    inset: 0;

    background-image: url('Images/Symbol.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: min(850px, 115vw);

    opacity: 0.025;

    pointer-events: none;

    z-index: 0;

    filter:
      drop-shadow(0 0 20px rgba(0,212,255,0.08));
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .mission-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 4px;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px, 3.5vw, 56px);
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,212,255,0.4);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* =========================
     SUBSYSTEM LAYOUT
  ========================= */

  .Subsystems {
    display: flex;
    justify-content: center;
    margin-top: 40px;
  }

  .Propulsion-wrapper {
    position: relative;
  }

  /* =========================
     MAIN BUTTON
  ========================= */

  .Propulsion {
    background-color: var(--accent);
    color: var(--bg);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 12px 24px;
    border: none;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .Propulsion:hover {
    box-shadow: 0 0 15px rgba(0,212,255,0.4);
  }

  .arrow {
    display: inline-block;
    margin-left: 8px;
    transition: transform 0.2s ease;
  }

  /* =========================
     DROPDOWN MENU
  ========================= */

  .options-container {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;

    display: flex;
    flex-direction: column;
    gap: 8px;

    min-width: 220px;

    padding: 12px;

    background: var(--panel);
    border: 1px solid var(--border);

    z-index: 100;

    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);

    transition: all 0.25s ease;
  }

  .PTS,
  .UTS {
    background: transparent;
    color: var(--text);

    border: 1px solid var(--border);

    padding: 10px;

    text-align: left;

    font-family: 'Share Tech Mono', monospace;

    cursor: pointer;

    transition: 0.2s ease;
  }

  .PTS:hover,
  .UTS:hover {
    background-color: var(--border);
    color: var(--accent);
  }

  /* =========================
     ACTIVE STATES
  ========================= */

  .Propulsion-wrapper.open .options-container {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .Propulsion-wrapper.open .arrow {
    transform: rotate(180deg);
  }
</style>
</head>

<body>

<div class="container">

  <header>
    <div class="mission-tag">
      PROJECT ASPERA — Solaris Rocketry & Exploration Society [SRES]
    </div>

    <h1>MISSION DASHBOARD</h1>

    <div class="subtitle"></div>
  </header>

  <!-- SUBSYSTEMS -->
  <div class="Subsystems">

    <div class="Propulsion-wrapper">

      <button id="buttonX" class="Propulsion">
        PROPULSION
        <span class="arrow">▼</span>
      </button>

      <div id="optionsMenu" class="options-container">
        <a href="https://devsarnojit7.github.io/Aspera/Propulsion/PropulsionTradeStudy/">
             <button class="PTS">Propulsion Trade Study</button>
        </a>
        <a href="https://devsarnojit7.github.io/Aspera/Propulsion/UniversalTestStand/">
            <button class="UTS">Universal Test Stand</button>
        </a>    
      </div>

    </div>

  </div>

</div>

<script>
  const wrapper = document.querySelector('.Propulsion-wrapper');
  const buttonX = document.getElementById('buttonX');

  buttonX.addEventListener('click', function(event) {
    event.stopPropagation();
    wrapper.classList.toggle('open');
  });

  document.addEventListener('click', function(event) {
    if (!wrapper.contains(event.target)) {
      wrapper.classList.remove('open');
    }
  });
</script>

</body>
</html>
